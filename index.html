<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6366F1">
<meta name="description" content="SP - CLASSROOM ระบบติดตามผลการเรียน">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SP Classroom">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366F1'/><stop offset='50%25' stop-color='%23EC4899'/><stop offset='100%25' stop-color='%23F43F5E'/></linearGradient></defs><rect width='512' height='512' rx='112' fill='url(%23g)'/><text x='256' y='268' text-anchor='middle' dominant-baseline='central' font-family='system-ui,-apple-system,sans-serif' font-weight='800' font-size='220' fill='%23FFFFFF' letter-spacing='-6'>SP</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366F1'/><stop offset='50%25' stop-color='%23EC4899'/><stop offset='100%25' stop-color='%23F43F5E'/></linearGradient></defs><rect width='512' height='512' rx='112' fill='url(%23g)'/><text x='256' y='268' text-anchor='middle' dominant-baseline='central' font-family='system-ui,-apple-system,sans-serif' font-weight='800' font-size='220' fill='%23FFFFFF' letter-spacing='-6'>SP</text></svg>">
<title>SP - CLASSROOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader"><div class="loader-spin"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== AUTH PAGE ===== -->
<div class="auth-page hidden" id="authPage">
  <div class="auth-card">
    <div class="auth-logo">SP - CLASSROOM</div>
    <div class="auth-sub">ระบบติดตามความคืบหน้านักเรียน</div>

    <div id="loginForm">
      <div class="auth-title">เข้าสู่ระบบ</div>
      <div class="fg">
        <label>อีเมล</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
      <div class="fg">
        <label>รหัสผ่าน</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-pri" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="auth-link">ยังไม่มีบัญชี? <a onclick="showRegister()">ลงทะเบียน</a></div>
    </div>

    <div id="registerForm" class="hidden">
      <div class="auth-title">ลงทะเบียน</div>
      <div class="fg">
        <label>ชื่อที่แสดง</label>
        <input type="text" id="regName" placeholder="ชื่อ-นามสกุล หรือ ชื่อเล่น" onkeypress="if(event.key==='Enter')doRegister()">
      </div>
      <div class="fg">
        <label>อีเมล</label>
        <input type="email" id="regEmail" placeholder="email@example.com" autocomplete="email" onkeypress="if(event.key==='Enter')doRegister()">
      </div>
      <div class="fg">
        <label>รหัสผ่าน</label>
        <input type="password" id="regPassword" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" onkeypress="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-pri" id="regBtn" onclick="doRegister()">ลงทะเบียน</button>
      <div class="auth-link"><a onclick="showLogin()">← กลับไปเข้าสู่ระบบ</a></div>
    </div>

    <div id="pendingForm" class="hidden">
      <div class="pending-box">
        <div class="pending-icon">⏳</div>
        <div class="pending-title">รอการอนุมัติ</div>
        <div class="pending-text">บัญชีของคุณถูกสร้างเรียบร้อยแล้ว<br>กรุณารอผู้ดูแลระบบอนุมัติก่อนใช้งาน</div>
        <div class="pending-email" id="pendingEmail"></div>
        <br>
        <button class="btn-outline" onclick="doLogout()">ออกจากระบบ</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div class="app-page hidden" id="appPage">
  <!-- Topbar (สลับระหว่าง logo กับ back) -->
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="topbar-back hidden" id="backBtn" onclick="goBack()">←</button>
      <div class="topbar-logo" id="topbarLogo">SP - CLASSROOM</div>
      <div class="topbar-title hidden" id="topbarTitle"></div>
    </div>
    <div class="topbar-right">
      <button class="bell-btn hidden" id="bellBtn" onclick="openPendingUsers()">
        🔔
        <span class="bell-badge hidden" id="bellBadge">0</span>
      </button>
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn-logout" onclick="doLogout()">ออก</button>
    </div>
  </div>

  <!-- Breadcrumb (เฉพาะใน curriculum drill-down) -->
  <div class="breadcrumb hidden" id="breadcrumb"></div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- FAB -->
  <button class="fab hidden" id="fab" onclick="onFabClick()">+</button>

  <!-- Bottom Tab Bar -->
  <div class="tabbar" id="tabbar">
    <!-- จะถูก render ตาม role -->
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
